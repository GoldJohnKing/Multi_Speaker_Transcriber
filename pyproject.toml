[project]
name = "multi-speaker-transcribe"
version = "0.1.0"
description = "Offline multi-speaker audio transcription pipeline for Chinese Mandarin"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pyyaml",
    "rich",
    "soundfile",
]

[project.optional-dependencies]
asr = [
    "funasr>=1.1",
    "modelscope",
    "torch>=2.1",
    "torchaudio>=2.1",
]
denoise = [
    "deepfilternet>=0.5",
]
diarize = [
    "pyannote.audio>=3.1",
]
separate = [
    "speechbrain>=1.0",
]
all = [
    "multi-speaker-transcribe[asr,denoise,diarize,separate]",
]
dev = [
    "pytest>=8.0",
]

[project.scripts]
transcribe = "transcribe.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["transcribe"]

[tool.pytest.ini_options]
testpaths = ["tests"]
