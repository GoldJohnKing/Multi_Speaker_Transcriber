device: auto
diarize: true
language: zh
speaker_references: null

diarizer:
  model: pyannote/speaker-diarization-community-1
  hf_token: null
  clustering: hidden_markov

matcher:
  embedding_model: speechbrain/spkrec-ecapa-voxceleb
  match_threshold: 0.5
  min_segment_seconds: 0.5

asr:
  model: paraformer-zh
  vad_model: fsmn-vad
  punc_model: ct-punc
  batch_size_s: 300

srt:
  max_chars_per_line: 20
  min_duration: 1.0
  merge_gap: 0.5
  speaker_label: true
