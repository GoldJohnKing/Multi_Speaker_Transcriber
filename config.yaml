device: auto
denoise: false
diarize: true
separate: false
tse: false
language: zh
speaker_references: null

denoiser:
  model: MossFormerGAN_SE_16K
  snr_threshold: 25

diarizer:
  model: pyannote/speaker-diarization-3.1
  hf_token: null
  clustering: hidden_markov

separator:
  model: MossFormer2_SS_16K
  max_segment_seconds: 10

extractor:
  model: AV_MossFormer2_TSE_16K
  min_track_frames: 50

matcher:
  embedding_model: speechbrain/spkrec-ecapa-voxceleb
  match_threshold: 0.5
  min_segment_seconds: 0.5

asr:
  model: paraformer-zh
  vad_model: fsmn-vad
  punc_model: ct-punc
  batch_size_s: 300

srt:
  max_chars_per_line: 20
  min_duration: 1.0
  merge_gap: 0.5
  speaker_label: true
